<div class="playlist-page">
  <div class="playlist-header">
    <div class="playlist-cover-placeholder" id="playlist-cover-wrap" style="position:relative; overflow:hidden;">
      <div id="playlist-cover-default"
        style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
        <i data-lucide="music" style="width:40px; height:40px; color:var(--text-muted);"></i>
      </div>
      <img id="playlist-cover-img" src=""
        style="width:100%; height:100%; object-fit:cover; border-radius:inherit; display:none;">

      <div
        style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); opacity:0; transition:opacity .2s;"
        id="cover-overlay">
        <i data-lucide="camera" style="width:24px; height:24px; color:#fff;"></i>
      </div>
      <input type="file" id="playlist-cover-input" accept="image/*" style="display:none;">
    </div>

    <div class="playlist-info">
      <span class="playlist-type" id="playlist-type-label">Çalma Listesi</span>
      <h1 class="playlist-title" id="playlist-title-edit" contenteditable="true">Çalma Listesi Adı</h1>
      <span class="playlist-owner">Kullanıcı • <span id="playlist-track-count">0</span> Şarkı</span>
    </div>
  </div>

  <div class="playlist-controls" style="display: flex; align-items: center; gap: 24px;">
    <button class="play-btn-large" id="playlist-play-large" title="Çal">
      <i data-lucide="play" style="fill: currentColor;"></i>
    </button>
    <button class="playlist-options-btn" id="playlist-options-trigger" title="Seçenekler"
      style="background:transparent; border:none; color:var(--text-muted); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; transition:all 0.2s;"
      onmouseover="this.style.color='#fff'; this.style.backgroundColor='rgba(255,255,255,0.06)';"
      onmouseout="this.style.color='var(--text-muted)'; this.style.backgroundColor='transparent';">
      <i data-lucide="more-horizontal"></i>
    </button>
  </div>

  <div class="playlist-tracks-list">
    <div class="track-row header">
      <span class="col-num">#</span>
      <span class="col-title">Başlık</span>
      <span class="col-album">Albüm</span>
      <span class="col-duration" style="text-align:right;"><i data-lucide="clock"></i></span>
      <span></span>
    </div>
    <div id="playlist-tracks-container" style="display:flex; flex-direction:column; gap:4px; margin-top:8px;"></div>
  </div>

  <!-- Dynamic bottom section will be appended here based on type -->
  <div id="playlist-bottom-section"></div>
</div>
