<style>
  @keyframes shazam-rotate-cw {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(360deg);
    }
  }

  @keyframes shazam-rotate-ccw {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(-360deg);
    }
  }

  @keyframes shazam-dot-pulse {
    0% {
      transform: scale(0.9);
      opacity: 0.5;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
    }

    70% {
      transform: scale(1.1);
      opacity: 1;
      box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
    }

    100% {
      transform: scale(0.9);
      opacity: 0.5;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
    }
  }

  @keyframes shazam-pulse-ring-new {
    0% {
      transform: scale(0.95);
      opacity: 0.7;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3);
    }

    70% {
      transform: scale(1.9);
      opacity: 0.15;
      box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
    }

    100% {
      transform: scale(2.5);
      opacity: 0;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
    }
  }

  .shazam-pulse-ring-active {
    animation: shazam-pulse-ring-new 3s cubic-bezier(0.25, 1, 0.5, 1) infinite;
  }

  .shazam-pulse-ring-active-delayed {
    animation: shazam-pulse-ring-new 3s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    animation-delay: 1.5s;
  }

  .shazam-glass-panel {
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .shazam-mic-hover {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .shazam-mic-hover:hover {
    transform: scale(1.05) !important;
    box-shadow: 0 25px 50px rgba(255, 255, 255, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.4), 0 0 45px rgba(255, 255, 255, 0.2) !important;
    border-color: rgba(255, 255, 255, 0.25) !important;
  }

  .shazam-mic-hover:hover i {
    transform: scale(1.12);
    color: #fff;
  }

  .shazam-mic-hover:active {
    transform: scale(0.95) !important;
    transition: all 0.1s;
  }

  .shazam-glow-hover {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .shazam-glow-hover:hover {
    border-color: rgba(255, 255, 255, 0.3) !important;
    background: rgba(255, 255, 255, 0.04) !important;
  }

  .shazam-glow-hover input:focus {
    color: #fff !important;
  }

  .shazam-text-glow {
    color: #fff;
  }

  .shazam-result-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 10px 14px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .shazam-result-card:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .shazam-result-card img {
    transition: transform 0.3s;
  }

  .shazam-result-card:hover img {
    transform: scale(1.05);
  }

  @keyframes shazam-slide-up {
    from {
      transform: translateY(20px);
      opacity: 0;
    }

    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .shazam-animate-slide-up {
    animation: shazam-slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .shazam-btn-primary {
    background: linear-gradient(135deg, #ffffff, #e6e6e6);
    border: none;
    color: #121212;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .shazam-btn-primary:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
  }

  .shazam-mic-armed {
    background: linear-gradient(135deg, #ffffff, #e6e6e6) !important;
  }

  .shazam-mic-armed i {
    color: #121212 !important;
  }

  .shazam-mic-listening {
    background: linear-gradient(135deg, #ffffff, #e6e6e6) !important;
  }

  .shazam-mic-listening i {
    color: #121212 !important;
  }
</style>

<div
  style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 24px; gap:28px; min-height:520px; position:relative; background: transparent; border-radius: 24px; overflow:hidden;"
  class="shazam-glass-panel">

  <!-- Header Group -->
  <div style="text-align:center; z-index:2;" id="shazam-header">
    <h2
      style="font-size:28px; font-weight:900; color:#fff; margin-bottom:10px; letter-spacing:-0.8px; font-family:inherit; ">
      Dinlemeyi Başlatın</h2>
    <p style="color:var(--text-muted); font-size:14px; max-width:340px; margin:0 auto; font-family:inherit; line-height:1.5; opacity:0.85;"
      id="shazam-sub-header">Aramayı başlatmak için ortadaki mikrofona tıklayın...</p>
  </div>

  <!-- High-End Visualizer Canvas & Glass Mic Core -->
  <div
    style="position:relative; width:280px; height:280px; display:flex; align-items:center; justify-content:center; z-index:2; margin:10px 0;"
    id="shazam-visualizer-area">

    <!-- Ripple Rings pulsing outward -->
    <div class="shazam-pulse-ring-active" id="shazam-ring-1"
      style="position:absolute; width:90px; height:90px; border-radius:50%; background:transparent; border:1px solid rgba(255, 255, 255, 0.2); pointer-events:none; display:none;">
    </div>
    <div class="shazam-pulse-ring-active-delayed" id="shazam-ring-2"
      style="position:absolute; width:90px; height:90px; border-radius:50%; background:transparent; border:1px solid rgba(255, 255, 255, 0.15); pointer-events:none; display:none;">
    </div>

    <!-- High-Tech Rotating Neon Rings -->
    <div
      style="position:absolute; width:160px; height:160px; border-radius:50%; border:1px dashed rgba(255, 255, 255, 0.18); animation: shazam-rotate-cw 12s infinite linear; pointer-events:none;">
    </div>
    <div
      style="position:absolute; width:180px; height:180px; border-radius:50%; border:1px dashed rgba(255, 255, 255, 0.12); animation: shazam-rotate-ccw 16s infinite linear; pointer-events:none;">
    </div>

    <!-- Glowing Siri-style wave Canvas -->
    <canvas id="shazam-canvas" width="280" height="280"
      style="position:absolute; top:0; left:0; pointer-events:none; z-index:2;"></canvas>

    <!-- Frosted Glass Mic Core -->
    <div id="shazam-mic-core" class="shazam-mic-hover"
      style="width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,0.03); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border:1.5px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; z-index:3; cursor:pointer;">
      <div id="shazam-mic-inner" class="shazam-mic-armed"
        style="width:62px; height:62px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.3s;">
        <i class="ph-fill ph-microphone-slash" style="font-size:24px; transition: transform 0.2s;"></i>
      </div>
    </div>
  </div>

  <!-- Controls & Fallback Interaction Area -->
  <div
    style="width:100%; max-width:400px; display:flex; flex-direction:column; gap:20px; align-items:center; z-index:3;"
    id="shazam-interaction-area">

    <!-- Premium Frosted Manual Input -->
    <div id="shazam-input-container"
      style="width:100%; display:none; opacity:0; transition:all 0.5s cubic-bezier(0.16, 1, 0.3, 1); transform:translateY(15px);">
      <div
        style="position:relative; display:flex; align-items:center; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.06); border-radius:28px; padding:6px 20px; backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); transition:all 0.3s; width:100%;"
        class="shazam-glow-hover">
        <i class="ph-fill ph-magnifying-glass"
          style="color:#ffffff; opacity:0.8; font-size:14px; margin-right:12px;"></i>
        <input type="text" id="shazam-manual-input" placeholder="Aklınızdaki şarkı sözlerini mırıldanın veya yazın..."
          style="flex:1; background:transparent; border:none; outline:none; color:#fff; padding:12px 0; font-size:14px; font-family:inherit; font-weight:500;">
      </div>
      <!-- Live Results -->
      <div id="shazam-live-results"
        style="display:flex; flex-direction:column; gap:10px; max-height:220px; overflow-y:auto; margin-top:16px; padding:6px;"
        class="custom-scroll"></div>
    </div>

  </div>

  <!-- Action Buttons -->
  <div style="z-index:2; display:flex; gap:14px; margin-top:6px;">
    <button class="btn btn-outline" id="shazam-cancel-btn"
      style="padding:12px 32px; font-weight:700; border-radius:24px; font-size:13px; border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.02); transition:all 0.2s;"
      onmouseover="this.style.color='#fff'; this.style.borderColor='rgba(255,255,255,0.3)'; this.style.background='rgba(255,255,255,0.06)';"
      onmouseout="this.style.color='rgba(255,255,255,0.7)'; this.style.borderColor='rgba(255,255,255,0.12)'; this.style.background='rgba(255,255,255,0.02)';">Vazgeç</button>
  </div>

</div>
